name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Create .env
        run: |
          cat > .env << EOF
          API_URL=${{ secrets.API_URL }}
          API_KEY=${{ secrets.API_KEY }}
          NODE_ENV=production
          EOF

      - run: npm run deploy
